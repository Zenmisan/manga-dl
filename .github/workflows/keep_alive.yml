name: Keep Render Backend Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping after 15 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend Health Endpoint
        run: |
          curl -s -f https://manga-dl-api.onrender.com/health || echo "Ping attempted"
