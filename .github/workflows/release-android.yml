name: Release Android (Capacitor)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Check Java Version
        run: java -version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build React App
        working-directory: ./frontend
        run: bun run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Build APK (Debug/Unsigned)
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv frontend/android/app/build/outputs/apk/debug/app-debug.apk MangaOS.apk

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: MangaOS.apk
          draft: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-android-{0}', github.run_number) }}
          name: "Manga OS Android ${{ github.ref_type == 'tag' && github.ref_name || 'Manual Build' }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
